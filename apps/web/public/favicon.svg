<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background: indigo-600 -->
  <rect width="32" height="32" rx="7" fill="#4f46e5"/>

  <g transform="translate(16 16)">
    <!-- 6 petals: indigo-200, each rotated 60° around center -->
    <ellipse cy="-7" rx="3.5" ry="5.5" fill="#c7d2fe" transform="rotate(0)"/>
    <ellipse cy="-7" rx="3.5" ry="5.5" fill="#c7d2fe" transform="rotate(60)"/>
    <ellipse cy="-7" rx="3.5" ry="5.5" fill="#c7d2fe" transform="rotate(120)"/>
    <ellipse cy="-7" rx="3.5" ry="5.5" fill="#c7d2fe" transform="rotate(180)"/>
    <ellipse cy="-7" rx="3.5" ry="5.5" fill="#c7d2fe" transform="rotate(240)"/>
    <ellipse cy="-7" rx="3.5" ry="5.5" fill="#c7d2fe" transform="rotate(300)"/>

    <!-- center: amber -->
    <circle r="4.5" fill="#f59e0b"/>
    <!-- center highlight -->
    <circle r="2" cx="-1" cy="-1" fill="#fde68a" opacity="0.75"/>
  </g>
</svg>

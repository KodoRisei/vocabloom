version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: vocabloom_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: vocabloom
      POSTGRES_PASSWORD: vocabloom_dev
      POSTGRES_DB: vocabloom_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocabloom -d vocabloom_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
